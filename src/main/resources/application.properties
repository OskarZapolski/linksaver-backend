# dodaj do gitIgnore
spring.application.name=linkDrop
spring.datasource.url=${NEON_DB_URL}
spring.datasource.username=${NEON_DB_USERNAME}
spring.datasource.password=${NEON_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

application.security.jwt.secret-key=${JWT_SECRET_KEY}

google.client.id=${GOOGLE_CLIENT_ID}